<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>珍藏阁原型图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .phone {
      width: 375px;
      background: linear-gradient(180deg, #2d1b4e 0%, #1a1a2e 100%);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      position: relative;
    }

    /* ── Banner ── */
    .banner {
      background: linear-gradient(135deg, #3d1f6e 0%, #6b3fa0 50%, #3d1f6e 100%);
      padding: 12px 16px 0;
      position: relative;
      overflow: hidden;
    }
    .banner::before {
      content: '';
      position: absolute;
      top: -20px; left: -20px; right: -20px;
      height: 80px;
      background: radial-gradient(ellipse, rgba(255,200,255,0.15) 0%, transparent 70%);
    }
    .banner-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .banner-subtitle {
      font-size: 11px;
      color: rgba(255,220,255,0.7);
    }
    .banner-btn {
      background: linear-gradient(90deg, #ff9a3c, #ff6b6b);
      color: #fff;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: bold;
    }
    .banner-title {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #ffe8a0;
      text-shadow: 0 0 20px rgba(255,200,100,0.8), 0 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 4px;
      padding: 4px 0 12px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: rgba(0,0,0,0.3);
      position: relative;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
    }
    .tab.active {
      color: #fff;
      font-weight: bold;
      background: rgba(255,255,255,0.08);
      border-bottom: 2px solid #e8a0ff;
    }
    .rules-btn {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 44px;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      writing-mode: vertical-rl;
      letter-spacing: 2px;
    }

    /* ── Body ── */
    .body {
      padding: 14px 16px;
    }

    /* Prize pool */
    .prize-row {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }
    .prize-label {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
    }
    .prize-value {
      font-size: 16px;
      font-weight: bold;
      color: #ffe066;
      margin-left: 6px;
    }
    .prize-icon {
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #ffe066, #ffaa00);
      border-radius: 50%;
      margin-left: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    /* Previous winner */
    .prev-section {
      margin-bottom: 16px;
    }
    .prev-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
    }
    .prev-card {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
    }
    .prev-name {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      flex: 1;
    }
    .guess-btn {
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: #fff;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 16px;
      font-weight: bold;
      white-space: nowrap;
    }

    /* Section title */
    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      margin-bottom: 14px;
      position: relative;
    }
    .section-title::before,
    .section-title::after {
      content: '✦';
      color: #e8a0ff;
      font-size: 10px;
      margin: 0 8px;
    }

    /* Item grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .item-card {
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: visible;
      position: relative;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .item-card.collected {
      background: linear-gradient(135deg, rgba(212,175,55,0.25), rgba(255,215,0,0.15));
      border-color: rgba(212,175,55,0.5);
    }
    .item-card.locked {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.08);
    }

    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      background: #e63946;
      border-radius: 50%;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      box-shadow: 0 2px 6px rgba(230,57,70,0.6);
    }

    .item-img {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* placeholder cross pattern */
    .item-img::before,
    .item-img::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.12);
    }
    .item-img::before { width: 100%; height: 1px; top: 50%; }
    .item-img::after  { width: 1px; height: 100%; left: 50%; }
    .item-img-border {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .item-name {
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      color: rgba(255,255,255,0.9);
      padding: 6px 4px 4px;
    }
    .item-card.locked .item-name {
      color: rgba(255,255,255,0.4);
    }
    .item-card.collected .item-name {
      color: #ffe066;
    }

    .use-btn {
      display: block;
      width: calc(100% + 2px);
      margin: 0 -1px -1px;
      background: linear-gradient(90deg, #e63946, #c1121f);
      color: #fff;
      font-size: 11px;
      text-align: center;
      padding: 5px 0;
      border-radius: 0 0 10px 10px;
      font-weight: bold;
    }
    .use-btn.disabled {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.3);
    }

    /* Bottom label */
    .bottom-label {
      text-align: center;
      padding: 10px 0 16px;
    }
    .bottom-tag {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      padding: 8px 40px;
      border-radius: 20px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- Banner -->
    <div class="banner">
      <div class="banner-top">
        <span class="banner-subtitle">限时活动 · 珍藏有礼</span>
        <span class="banner-btn">活动课程</span>
      </div>
      <div class="banner-title">珍藏阁</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active">收藏阁</div>
      <div class="tab">珍藏榜</div>
      <div class="rules-btn">规则</div>
    </div>

    <!-- Body -->
    <div class="body">

      <!-- Prize pool -->
      <div class="prize-row">
        <span class="prize-label">收藏奖池：</span>
        <span class="prize-value">5000钻</span>
        <span class="prize-icon">◆</span>
      </div>

      <!-- Previous winner -->
      <div class="prev-section">
        <div class="prev-label">上一期收藏王：</div>
        <div class="prev-card">
          <div class="avatar">主播<br>头像</div>
          <span class="prev-name">主播昵称</span>
          <div class="guess-btn">点击查看</div>
        </div>
      </div>

      <!-- Section title -->
      <div class="section-title">当前收集的道具</div>

      <!-- Item grid -->
      <div class="grid">

        <!-- 贝壳盒 locked -->
        <div class="item-card locked">
          <div class="item-img"><div class="item-img-border"></div></div>
          <div class="item-name">贝壳盒</div>
          <div class="use-btn disabled">去使用</div>
        </div>

        <!-- 珍珠链 locked -->
        <div class="item-card locked">
          <div class="item-img"><div class="item-img-border"></div></div>
          <div class="item-name">珍珠链</div>
          <div class="use-btn disabled">去使用</div>
        </div>

        <!-- 女巫 collected badge:1 -->
        <div class="item-card collected">
          <div class="badge">1</div>
          <div class="item-img"><div class="item-img-border"></div></div>
          <div class="item-name">捧花</div>
          <div class="use-btn">去使用</div>
        </div>

        <!-- 骑士 collected badge:3 -->
        <div class="item-card collected">
          <div class="badge">3</div>
          <div class="item-img"><div class="item-img-border"></div></div>
          <div class="item-name">玫瑰束</div>
          <div class="use-btn">去使用</div>
        </div>

        <!-- 摄梦人 collected badge:2 -->
        <div class="item-card collected">
          <div class="badge">2</div>
          <div class="item-img"><div class="item-img-border"></div></div>
          <div class="item-name">花卉框</div>
          <div class="use-btn">去使用</div>
        </div>

        <!-- 预言家 locked -->
        <div class="item-card locked">
          <div class="item-img"><div class="item-img-border"></div></div>
          <div class="item-name">蕾丝框</div>
          <div class="use-btn disabled">去使用</div>
        </div>

      </div>

      <!-- Bottom label -->
      <div class="bottom-label">
        <span class="bottom-tag">珍藏阁</span>
      </div>

    </div>
  </div>
</body>
</html>
